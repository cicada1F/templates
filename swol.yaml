proxy-groups:
  - name: 🛡️ MAIN
    type: fallback
    url: *test_url
    interval: 300
    timeout: 5000
    hidden: false
    proxies:
      - 🇷🇺 RU
      - 🇪🇺 EU-TW
      - 🎮 Gaming-EU
      - 🌐 NODES
  # =========================================================
  # 🇷🇺 RU(TOP PRIORITY)
  # =========================================================
  - name: 🇷🇺 RU
    type: select
    include-all: true
    filter: "(?i)Ваше_название(у панели Ремня они находятся в Hosts)"
    hidden: true
  # =========================================================
  # 🇪🇺 EU
  # =========================================================
  - name: 🇪🇺 EU
    type: select
    include-all: true
    filter: "(?i)Ваше_название(у панели Ремня они находятся в Hosts)"
    hidden: true
  # =========================================================
  # 🎮 Gaming-EU-TW
  # =========================================================
  - name: 🎮 Gaming-EU
    type: select
    include-all: true
    filter: "(?i)Ваше_название(у панели Ремня они находятся в Hosts)"
    hidden: true
  # =========================================================
  # 🌐 FALLBACK NODES (LAST RESORT)
  # =========================================================
  - name: 🌐 NODES
    type: url-test
    include-all: true
    filter: "Ваше_название(у панели Ремня они находятся в Hosts)"
    exclude-filter: "(?i)Тут я бы исключчил предыдущие"
    url: *test_url
    interval: 300
    tolerance: 120
    hidden: true

