# ==================== DNS ====================
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-system-hosts: true
  use-hosts: true
  fake-ip-filter:
    - rule-set:private-domains
    - "*.lan"
    - "*.local"
    - "*.internal"
    - "*.corp"
    - "*.home"
    - "+.kaspersky-labs.com"
    - "+.kaspersky.com"
    - "+.kaspersky.ru"
    - "+.max.ru"

  default-nameserver:
    - https://94.140.14.14/dns-query#DIRECT
    - https://8.8.8.8/dns-query#DIRECT
    - https://77.88.8.8/dns-query#DIRECT
  proxy-server-nameserver:
    - https://94.140.14.14/dns-query#DIRECT
    - https://8.8.8.8/dns-query#DIRECT
    - https://77.88.8.8/dns-query#DIRECT
  direct-nameserver:
    - https://77.88.8.8/dns-query#DIRECT
    - https://8.8.8.8/dns-query#DIRECT
    - 77.88.8.8#DIRECT
    - system
  nameserver:
    - https://8.8.8.8/dns-query#🌍 Остальные сайты
    - https://94.140.14.14/dns-query#🌍 Остальные сайты
    - https://77.88.8.8/dns-query#🌍 Остальные сайты
  nameserver-policy:
    rule-set:private-domains:
      - system
    rule-set:oisd_big:
      - rcode://success
    rule-set:microsoft:
      - system
    rule-set:category-ru:
      - system
    "+.kaspersky-labs.com":
      - rcode://success
    "+.kaspersky.com":
      - rcode://success
    "+.kaspersky.ru":
      - rcode://success
    "+.max.ru":
      - rcode://success

# ==================== SNIFFER ====================
sniffer:
  enable: true
  override-destination: false
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
    TLS:
      ports:
        - 443
        - 8443
  skip-dst-address:
    - 224.0.0.0/3
    - 10.0.0.0/8
    - 127.0.0.0/8
    - 100.64.0.0/10
    - 172.16.0.0/12
    - 198.18.0.0/15
    - 169.254.0.0/16
    - 192.168.0.0/16
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 198.51.100.0/24
    - 203.0.113.0/24
    - fc00::/7
    - ff00::/8
    - fe80::/10
    - ::/127

